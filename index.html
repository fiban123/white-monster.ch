<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Monster Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="graph-canvas"></canvas>
    <header>
        <div class="theme-toggle-container">
            <button id="theme-toggle" aria-label="Toggle dark/light mode">
                <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
        </div>
        <div class="header-content">
            <h1>White Monster <span class="accent-text">Tracker</span></h1>
        </div>
        <div class="stats-grid" id="stats-container">
            <!-- Stats will be injected here -->
        </div>
    </header>

    <main class="container" id="card-container">
        <!-- Cards will be injected here by JS -->
    </main>

    <img id="linus-img" src="linus.webp" alt="Happy Linus Torvalds" style="display: none;">

    <footer class="footer">
        <p>&copy; 2026 White Monster Tracker by fiban123</p>
    </footer>

    <script src="data.js"></script>
    <script>
        // Theme Toggle Implementation
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

        function setTheme(theme) {
            htmlElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.innerHTML = theme === 'light' ? moonIcon : sunIcon;
        }

        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        setTheme(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });

        // Graph Background Implementation (Aura Style)
        const canvas = document.getElementById('graph-canvas');
        const ctx = canvas.getContext('2d');
        let orbs = [];
        const orbCount = 8;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Orb {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = Math.random() * 200 + 150;
                
                const angle = Math.random() * Math.PI * 2;
                this.speed = 0.2 + Math.random() * 0.3;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                
                // Gemini colors
                const colors = [
                    { dark: 'rgba(66, 133, 244, 0.2)', light: 'rgba(66, 133, 244, 0.1)' },
                    { dark: 'rgba(155, 114, 203, 0.2)', light: 'rgba(155, 114, 203, 0.1)' },
                    { dark: 'rgba(0, 209, 255, 0.2)', light: 'rgba(0, 209, 255, 0.1)' }
                ];
                this.colorSet = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }

            draw(theme) {
                const color = theme === 'light' ? this.colorSet.light : this.colorSet.dark;
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            orbs = [];
            for (let i = 0; i < orbCount; i++) {
                orbs.push(new Orb());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const currentTheme = htmlElement.getAttribute('data-theme');
            
            // For light mode, we might want a slightly different clear logic or background color
            // But since CSS handles background, we just draw the orbs.
            
            orbs.forEach(orb => {
                orb.update();
                orb.draw(currentTheme);
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        init();
        animate();

        const container = document.getElementById('card-container');
        const statsContainer = document.getElementById('stats-container');

        function renderStats() {
            const total = monsterSites.length;
            const inStock = monsterSites.filter(s => s.status === 'available').length;
            const onSale = monsterSites.filter(s => s.discountPercent > 0).length;

            statsContainer.innerHTML = `
                <div class="stat-item">
                    <span class="stat-label">Retailers</span>
                    <span class="stat-value">${total}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">In Stock</span>
                    <span class="stat-value ${inStock > 0 ? 'text-success' : 'text-muted'}">${inStock}</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">On Sale</span>
                    <span class="stat-value text-accent">${onSale}</span>
                </div>
            `;
        }

        function renderCards() {
            const sortedSites = [...monsterSites].sort((a, b) => {
                if (a.status === 'available' && b.status !== 'available') return -1;
                if (a.status !== 'available' && b.status === 'available') return 1;
                return 0;
            });

            container.innerHTML = sortedSites.map(site => {
                const isOnSale = site.discountPercent > 0;
                const actualTotalPrice = isOnSale 
                    ? site.totalPrice * (1 - site.discountPercent / 100) 
                    : site.totalPrice;
                
                const unitPrice = actualTotalPrice / site.count;
                const originalUnitPrice = site.totalPrice / site.count;

                return `
                    <div class="card ${site.status === 'available' ? 'status-available' : 'status-oos'} ${isOnSale ? 'is-sale' : ''}">
                        <div class="card-header">
                            <h2 class="site-name">${site.name}</h2>
                            <div class="badges">
                                ${isOnSale ? `<span class="badge badge-sale">-${site.discountPercent}%</span>` : ''}
                                <span class="badge badge-status">
                                    ${site.status === 'available' ? 'Available' : 'Out of Stock'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="price-grid">
                            <div class="price-main">
                                <span class="price-value">CHF ${unitPrice.toFixed(2)}</span>
                                <span class="price-label">per Monster</span>
                            </div>
                            ${isOnSale ? `<div class="price-original">was CHF ${originalUnitPrice.toFixed(2)}</div>` : ''}
                        </div>

                        <div class="inventory-info">
                            Pack: ${site.count}pc &bull; Total CHF ${actualTotalPrice.toFixed(2)}
                        </div>

                        <div class="card-actions">
                            <a href="${site.url}" target="_blank" class="btn-primary">
                                <span>View Deal</span>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                            <div class="timestamp">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                ${site.lastChecked}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        renderStats();
        renderCards();

        async function detectLinux() {
            let isLinux = false;
            if (navigator.userAgentData) {
                try {
                    const ua = await navigator.userAgentData.getHighEntropyValues(['platform']);
                    isLinux = ua.platform === 'Linux';
                } catch (e) {
                    isLinux = window.navigator.userAgent.toLowerCase().includes('linux');
                }
            } else {
                isLinux = window.navigator.userAgent.toLowerCase().includes('linux');
            }

            if (isLinux) {
                document.getElementById('linus-img').style.display = 'block';
            }
        }
        detectLinux();
    </script>
</body>
</html>
